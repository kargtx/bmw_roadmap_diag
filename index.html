<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Дизель-Чек</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Верхняя панель с кнопками (скрывается при скролле) -->
    <div class="top-bar" id="topBar">
        <div class="top-bar-content">
            <button class="top-btn" onclick="addNewItem()">
                <span>➕</span> Добавить
            </button>
            <button class="top-btn" onclick="clearAllChecks()">
                <span>🗑️</span> Снять все
            </button>
        </div>
    </div>

    <div class="container">
        <!-- Шапка с заголовком -->
        <div class="header" id="header">
            <h1>🚛 Дизель-Чек</h1>
            <div class="header-stats" id="headerStats">
                <span id="completedCount">0</span>/<span id="totalCount">14</span>
            </div>
        </div>

        <!-- Данные автомобиля -->
        <div class="vehicle-bar">
            <div class="vehicle-field">
                <label for="modelCodeInput">Код модели BMW</label>
                <input type="text" id="modelCodeInput" placeholder="Например: G30" maxlength="12">
            </div>
            <div class="vehicle-field">
                <label for="plateInput">Госномер</label>
                <input type="text" id="plateInput" placeholder="Х666ХХ666" maxlength="9">
                <div class="field-hint">Формат: Х666ХХ666</div>
            </div>
        </div>

        <!-- Прогресс-бар (виден только вверху) -->
        <div class="progress-container" id="progressContainer">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
            <div class="progress-text">
                <span id="progressPercent">0%</span> выполнено
            </div>
        </div>

        <!-- Индикатор синхронизации -->
        <div class="sync-indicator" id="syncIndicator">
            <span id="syncStatus">🔄 Синхронизация...</span>
        </div>

        <!-- Выезжающая панель инструментов -->
        <div class="tools-overlay" id="toolsOverlay"></div>
        <button class="tools-toggle-btn" id="toolsToggleBtn" onclick="toggleToolsPanel()">
            ⚙️
        </button>
        <div class="tools-panel" id="toolsPanel">
            <div class="tools-panel-header">
                <span>Панель инструментов</span>
                <button class="tools-close-btn" onclick="closeToolsPanel()">✕</button>
            </div>
            <div class="tools-content">
                <button class="tool-btn" onclick="restoreFromBackupFlow()">
                    🔄 Восстановить из бэкапа
                </button>
                <button class="tool-btn" onclick="toggleTheme()" id="themeToggleSmall">
                    🌙 Сменить тему
                </button>
                <div class="tool-section">
                    <button class="tool-btn" onclick="unlockInspections()">
                        🔐 Показать проверки мастера
                    </button>
                    <div class="master-content hidden" id="inspectionsList"></div>
                </div>
            </div>
        </div>

        <!-- Список пунктов -->
        <div class="items-list" id="itemsList"></div>

        <!-- Кнопка окончания проверки -->
        <button class="finish-btn" onclick="finishInspection()">
            ✅ ОКОНЧИТЬ ПРОВЕРКУ
        </button>

        <!-- Подвал -->
        <div class="footer">
            <span id="lastSyncTime"></span>
        </div>
    </div>

    <!-- Модальное окно для справки (только кнопка закрытия) -->
    <div class="modal" id="helpModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="helpModalTitle">Справка</h3>
                <button class="modal-close" onclick="closeHelpModal()">✖</button>
            </div>
            <div class="modal-help-content" id="modalHelpContent"></div>
            <div class="modal-buttons" style="margin-top: 20px;">
                <button class="modal-btn primary" onclick="editCurrentHelp()">✏️ Редактировать</button>
                <button class="modal-btn secondary" onclick="closeHelpModal()">Закрыть</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно редактирования -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="editModalTitle">Редактирование</h3>
                <button class="modal-close" onclick="closeEditModal()">✖</button>
            </div>
            
            <input type="text" class="modal-input" id="editTitle" placeholder="Название пункта">
            <textarea class="modal-textarea" id="editHelp" placeholder="Текст справки..."></textarea>
            
            <div class="modal-buttons">
                <button class="modal-btn primary" onclick="saveItem()">Сохранить</button>
                <button class="modal-btn secondary" onclick="closeEditModal()">Отмена</button>
            </div>
            
            <button class="modal-btn danger" style="margin-top: 12px;" onclick="deleteCurrentItem()" id="deleteBtn">
                🗑️ Удалить пункт
            </button>
        </div>
    </div>

    <!-- Подключаем JavaScript -->
    <script src="xmlParser.js"></script>
    <script src="app.js"></script>
</body>
</html>
